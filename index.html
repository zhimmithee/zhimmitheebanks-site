
<!DOCTYPE html>
<html lang="en" class="bg-[#050505] text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Zhimmithee Banks | The IT Athlete</title>
</head>
<body class="font-sans industrial-grid h-screen flex items-center justify-center">
    <div class="max-w-xl w-full px-6">
        <div class="mb-12">
            <h1 class="text-4xl md:text-5xl font-black mb-6 leading-tight">
                You support the tech.<br>
                <span class="text-[#fd4900]">I support you.</span>
            </h1>
            <p class="text-lg text-neutral-400 mb-8 leading-relaxed">
                I help 30–55-year-old IT professionals clear Physical Technical Debt. No fitness fluff, no guru posturing. Just system maintenance for the hardware you can't replace.
            </p>
            
            <form action="YOUR_CONVERTKIT_FORM_ACTION" method="post" class="space-y-4">
                <input type="email" required placeholder="Enter your work email..." 
                       class="w-full bg-[#0a0a0a] border border-[#333333] px-4 py-3 text-sm focus:outline-none focus:border-[#fd4900] transition-colors">
                <button type="submit" 
                        class="w-full bg-[#fd4900] text-[#050505] font-extrabold text-sm py-3 px-6 tracking-wide hover:opacity-90 transition-opacity">
                    ACCESS THE MOVEMENT PATCH →
                </button>
            </form>
            
            <p class="mt-4 text-xs text-neutral-600 font-mono">
                1,400+ tech pros already running the patch.
            </p>
        </div>

        <footer class="pt-12 border-t border-[#1a1a1a]">
            <p class="text-xs text-neutral-500 uppercase tracking-widest">
                Zhimmithee Banks | The IT Athlete
            </p>
        </footer>
    </div>
</body>
</html>
